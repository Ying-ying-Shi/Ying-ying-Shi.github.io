short_bio: >-
-  Yingying Shi is currently working as a Postdoctoral Researcher in the College of Pharmaceutical Sciences, Zhejiang University, advised by Prof.<a href="https://person.zju.edu.cn/yiwang">Yi Wang</a>. 
-  She received the Bachelor's degree (major in Pharmacy and minor in English) from East China University of Science and Technology, and the Medical Doctor (M.D.) degree in Pharmacy from Zhejiang University (supervised by Prof.<a href="https://person.zju.edu.cn/jyou">You Jian</a>). 
-  Yingying Shi's research mainly focuses on the construction of drug delivery systems and its application in immune regulation and disease treatment. She has published over 30 academic papers, including 15 SCI papers in Science Advances, Signal Transduction and Targeted Therapy, Advanced Functional Materials, ACS Nano, Journal of Controlled Release, Biomaterials, Nano Today, Advanced Healthcare Materials, and other TOP journals as the first author. In addition, she has applied for 4 Chinese invention patents and 1 PCT international patent; and conducted 3 research projects as the principal investigator, including 1 from National Natural Science Foundation of China, and 2 from China Postdoctoral Science Foundation. Moreover, she also serves as a young editor for the academic journal Scientific Reports since 2024. 
-  Yingying Shi is now working on the formulation of mRNA-based drugs for anti-aging therapy and immunotherapy.
